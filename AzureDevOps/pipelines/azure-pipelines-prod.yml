trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

parameters:
  - name: poolName
    type: string
    default: 'Default'

  - name: agentName
    type: string
    default: 'raspi4'

stages:

  # ─── CI Stage ──────────────────────────────────────────────────────────────
  - template: ../templates/build.yml
    parameters:
      poolName: ${{ parameters.poolName }}
      agentName: ${{ parameters.agentName }}
      imageName: 'performance'
      serviceConnection: 'testregistryname'

  # ─── CD Stage ──────────────────────────────────────────────────────────────
  - template: ../templates/deploy.yml
    parameters:
      poolName: ${{ parameters.poolName }}
      agentName: ${{ parameters.agentName }}
      # ── Environment ──────────────────────────────────────────────────────
      appEnv: 'Production'
      targetBranch: 'refs/heads/master'
      # ── Container ────────────────────────────────────────────────────────
      apiContainerName: 'performance-webapi-prod'
      dockerNetwork: 'performance-network-prod'
      apiPort: '8081'
      # ── Registry ─────────────────────────────────────────────────────────
      acrShortName: 'testregistryname'
      imageName: 'performance'
      keepImages: '5'