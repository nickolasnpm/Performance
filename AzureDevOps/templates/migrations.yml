parameters:
  # Agent
  - name: poolName
    type: string

  - name: agentName
    type: string

  # Environment
  - name: appEnv
    type: string

  # Container
  - name: apiContainerName
    type: string

  - name: dockerNetwork
    type: string

  # Registry
  - name: imageName
    type: string

  - name: keepImages
    type: string

  # ── Secrets stored directly in Pipeline Variables (not declared here) ───────
  # DefaultConnection

stages:
  # Migration Stage
  - stage: Migrate
    displayName: "EF Core Migrations (${{ parameters.appEnv }})"
    condition: |
      and(
        eq('${{ parameters.appEnv }}', 'Production'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - deployment: RunMigrations
        displayName: "Run EF Core Migrations on Raspberry Pi"
        environment: "raspberry-pi"
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Running EF Core migrations..."

                    docker run --rm \
                      --stop-timeout 60 \
                      --name ${{ parameters.apiContainerName }}-migration \
                      --network ${{ parameters.dockerNetwork }} \
                      -e ASPNETCORE_ENVIRONMENT=${{ parameters.appEnv }} \
                      -e ConnectionStrings__DefaultConnection="$(DefaultConnection)" \
                      ${{ parameters.imageName }}:latest

                    MIGRATION_EXIT=$?
                    if [ $MIGRATION_EXIT -ne 0 ]; then
                      echo "##[error] EF Core migration failed with exit code $MIGRATION_EXIT. Aborting deployment."
                      exit $MIGRATION_EXIT
                    fi

                    echo "EF Core migrations applied successfully!"
                  displayName: "Run EF Core Migrations"
                  timeoutInMinutes: 10

                - script: |
                    echo "Removing migration container if still running or exited..."
                    docker rm -f ${{ parameters.apiContainerName }}-migration 2>/dev/null || true
                    echo "Migration container removed."
                  displayName: "Remove Migration Container"
                  condition: always()

                - script: |
                    echo "Removing dangling images..."
                    docker image prune -f

                    echo "Keeping only last ${{ parameters.keepImages }} images, removing older ones..."
                    docker images ${{ parameters.imageName }} --format "{{.Tag}}" | \
                      grep -v latest | \
                      sort -rn | \
                      tail -n +$((${{ parameters.keepImages }} + 1)) | \
                      xargs -I {} docker rmi ${{ parameters.imageName }}:{} 2>/dev/null || true

                    echo "Local cleanup complete!"
                  displayName: "Cleanup Old Local Images"
                  condition: always()