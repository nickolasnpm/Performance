trigger:
  branches:
    include:
      - develop

pr:
  branches:
    include:
      - develop

variables:
  acrName: 'testregistryname.azurecr.io'
  imageName: 'performance'
  imageTag: '$(Build.BuildId)'
  serviceConnection: 'testregistryname'

stages:

  # ─── CI Stage: Runs on PR creation and new commits to PR ───────────────────
  - stage: Build
    displayName: 'Build & Push Docker Image'
    jobs:
      - job: BuildImage
        displayName: 'Build Docker Image for ARM64'
        pool:
          vmImage: 'ubuntu-latest'
        steps:

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              containerRegistry: '$(serviceConnection)'
              repository: '$(imageName)'
              dockerfile: '$(Build.SourcesDirectory)/Performance/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)/Performance'
              tags: |
                $(imageTag)
                latest
              arguments: '--platform linux/arm64'

          - task: Docker@2
            displayName: 'Push to ACR'
            condition: and(succeeded(), eq(variables['Build.Reason'], 'IndividualCI'))
            inputs:
              command: push
              containerRegistry: '$(serviceConnection)'
              repository: '$(imageName)'
              tags: |
                $(imageTag)
                latest