parameters:
  # Agent
  - name: poolName
    type: string

  - name: agentName
    type: string

  # Registry
  - name: imageName
    type: string

stages:
  # CI Stage
  - stage: Build
    displayName: 'Build & Test'
    variables:
      imageTag: '$(Build.BuildId)'
      rootPath: '$(Build.SourcesDirectory)'
      dockerfilePath: '$(Build.SourcesDirectory)/Performance/Dockerfile'
      unitTestPath: "$(Build.SourcesDirectory)/UnitTest"
      integrationTestPath: "$(Build.SourcesDirectory)/IntegrationTest"
      testResultsPath: "$(Agent.TempDirectory)/TestResults"
      unitTestResultsFile: "$(Agent.TempDirectory)/TestResults/unit-test-results.trx"
      unitCoverageResultsFile: "$(Agent.TempDirectory)/TestResults/unit-coverage.xml"
      integrationTestResultsFile: "$(Agent.TempDirectory)/TestResults/integration-test-results.trx"
      integrationCoverageResultsFile: "$(Agent.TempDirectory)/TestResults/integration-coverage.xml"
    jobs:
      - job: RunUnitTests
        displayName: 'Run Unit Tests'
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          - task: UseDotNet@2
            displayName: 'Use .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - script: |
              dotnet restore "$(unitTestPath)"
            displayName: 'Restore Unit Test Dependencies'

          - script: |
              dotnet test "$(unitTestPath)" \
                --configuration Release \
                --logger "trx;LogFileName=unit-test-results.trx" \
                --results-directory "$(testResultsPath)" \
                /p:CollectCoverage=true \
                /p:CoverletOutputFormat=cobertura \
                /p:CoverletOutput="$(unitCoverageResultsFile)"
            displayName: 'Run Unit Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Unit Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(unitTestResultsFile)'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Unit Test Coverage'
            condition: always()
            inputs:
              summaryFileLocation: '$(unitCoverageResultsFile)'

      - job: RunIntegrationTests
        displayName: 'Run Integration Tests'
        dependsOn: RunUnitTests
        condition: succeeded()
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          - task: UseDotNet@2
            displayName: 'Use .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - script: |
              dotnet restore "$(integrationTestPath)"
            displayName: 'Restore Integration Test Dependencies'

          - script: |
              dotnet test "$(integrationTestPath)" \
                --configuration Release \
                --logger "trx;LogFileName=integration-test-results.trx" \
                --results-directory "$(testResultsPath)" \
                /p:CollectCoverage=true \
                /p:CoverletOutputFormat=cobertura \
                /p:CoverletOutput="$(integrationCoverageResultsFile)"
            displayName: 'Run Integration Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Integration Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(integrationTestResultsFile)'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Integration Test Coverage'
            condition: always()
            inputs:
              summaryFileLocation: '$(integrationCoverageResultsFile)'

      - job: BuildImage
        displayName: 'Build Docker Images'
        dependsOn: RunUnitTests
        condition: succeeded()
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:
          - task: Docker@2
            displayName: 'Build Deployment Image'
            inputs:
              command: build
              repository: ${{ parameters.imageName }}
              dockerfile: '$(dockerfilePath)'
              buildContext: '$(rootPath)'
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Build Migration Image'
            inputs:
              command: build
              repository: ${{ parameters.imageName }}-migration
              dockerfile: '$(dockerfilePath)'
              buildContext: '$(rootPath)'
              arguments: '--target migrate'
              tags: |
                $(imageTag)
                latest

      - job: SecurityScan
        displayName: 'Security Scan'
        dependsOn:
          - RunIntegrationTests
          - BuildImage
        condition: succeeded()
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          - script: |
              # Semgrep (SAST)
              pip3 install semgrep --break-system-packages

              # Trivy (Vuln + Container + IaC)
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin

              # Gitleaks (Secrets)
              curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_arm64.tar.gz \
                | tar -xz -C /usr/local/bin gitleaks

              mkdir -p "$(Agent.TempDirectory)/sarif"
            displayName: 'Install Security Tools'

          - script: |
              semgrep scan \
                --config=auto \
                --sarif \
                --output "$(Agent.TempDirectory)/sarif/semgrep.sarif" \
                "$(Build.SourcesDirectory)" \
                || true
            displayName: 'Semgrep - SAST Code Vulnerability Scan'

          - script: |
              gitleaks detect \
                --source "$(Build.SourcesDirectory)" \
                --report-format sarif \
                --report-path "$(Agent.TempDirectory)/sarif/gitleaks.sarif" \
                --exit-code 0
            displayName: 'Gitleaks - Secret Scan'

          - script: |
              trivy fs "$(Build.SourcesDirectory)" \
                --scanners vuln,secret,misconfig \
                --format sarif \
                --output "$(Agent.TempDirectory)/sarif/trivy-fs.sarif" \
                --exit-code 0

              trivy image ${{ parameters.imageName }}:latest \
                --format sarif \
                --output "$(Agent.TempDirectory)/sarif/trivy-image.sarif" \
                --exit-code 0
            displayName: 'Trivy - Container & Dependency Vulnerability Scan'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Security Scan Results'
            condition: always()
            inputs:
              pathToPublish: '$(Agent.TempDirectory)/sarif'
              artifactName: 'CodeAnalysisLogs'