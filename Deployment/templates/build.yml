parameters:
  # Agent
  - name: poolName
    type: string

  - name: agentName
    type: string

  # Registry
  - name: imageName
    type: string

stages:
  # CI Stage
  - stage: Build
    displayName: 'Build & Test'
    variables:
      imageTag: '$(Build.BuildId)'
      rootPath: '$(Build.SourcesDirectory)'
      dockerfilePath: '$(Build.SourcesDirectory)/Performance/Dockerfile'
      unitTestPath: "$(Build.SourcesDirectory)/UnitTest"
      integrationTestPath: "$(Build.SourcesDirectory)/IntegrationTest"
      testResultsPath: "$(Agent.TempDirectory)/TestResults"
      unitTestResultsFile: "$(Agent.TempDirectory)/TestResults/unit-test-results.trx"
      unitCoverageResultsFile: "$(Agent.TempDirectory)/TestResults/unit-coverage.xml"
      integrationTestResultsFile: "$(Agent.TempDirectory)/TestResults/integration-test-results.trx"
      integrationCoverageResultsFile: "$(Agent.TempDirectory)/TestResults/integration-coverage.xml"
    jobs:
      - job: RunUnitTests
        displayName: 'Run Unit Tests'
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          - task: UseDotNet@2
            displayName: 'Use .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - script: |
              dotnet restore "$(unitTestPath)"
            displayName: 'Restore Unit Test Dependencies'

          - script: |
              mkdir -p "$(testResultsPath)"
              dotnet test "$(unitTestPath)" \
                --configuration Release \
                --logger "trx;LogFileName=unit-test-results.trx" \
                --results-directory "$(testResultsPath)" \
                --collect:"XPlat Code Coverage" \
                -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
            displayName: 'Run Unit Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Unit Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(unitTestResultsFile)'
              failTaskOnFailedTests: true

          - script: |
              export PATH="$PATH:$HOME/.dotnet/tools"

              # Check if reportgenerator is already installed
              if ! command -v reportgenerator &> /dev/null; then
                echo "reportgenerator not found, installing..."
                dotnet tool install -g dotnet-reportgenerator-globaltool
              else
                echo "reportgenerator already installed: $(reportgenerator --version)"
              fi

              reportgenerator \
                -reports:"$(testResultsPath)/**/coverage.cobertura.xml" \
                -targetdir:"$(testResultsPath)/UnitCoverageReport" \
                -reporttypes:"HtmlInline;Cobertura"
            displayName: 'Generate Unit Test Coverage Report'
            condition: always()

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Unit Test Coverage'
            condition: always()
            inputs:
              pathToPublish: '$(testResultsPath)/UnitCoverageReport'
              artifactName: 'UnitTestCoverageReport'

      - job: RunIntegrationTests
        displayName: 'Run Integration Tests'
        dependsOn: RunUnitTests
        condition: succeeded()
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          - task: UseDotNet@2
            displayName: 'Use .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - script: |
              dotnet restore "$(integrationTestPath)"
            displayName: 'Restore Integration Test Dependencies'

          - script: |
              mkdir -p "$(testResultsPath)"
              dotnet test "$(integrationTestPath)" \
                --configuration Release \
                --logger "trx;LogFileName=integration-test-results.trx" \
                --results-directory "$(testResultsPath)" \
                --collect:"XPlat Code Coverage" \
                -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
            displayName: 'Run Integration Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Integration Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(integrationTestResultsFile)'
              failTaskOnFailedTests: true

          - script: |
              export PATH="$PATH:$HOME/.dotnet/tools"

              # Check if reportgenerator is already installed
              if ! command -v reportgenerator &> /dev/null; then
                echo "reportgenerator not found, installing..."
                dotnet tool install -g dotnet-reportgenerator-globaltool
              else
                echo "reportgenerator already installed: $(reportgenerator --version)"
              fi

              reportgenerator \
                -reports:"$(testResultsPath)/**/coverage.cobertura.xml" \
                -targetdir:"$(testResultsPath)/IntegrationCoverageReport" \
                -reporttypes:"HtmlInline;Cobertura"
            displayName: 'Generate Integration Test Coverage Report'
            condition: always()

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Integration Test Coverage'
            condition: always()
            inputs:
              pathToPublish: '$(testResultsPath)/IntegrationCoverageReport'
              artifactName: 'IntegrationTestCoverageReport'

      - job: BuildImage
        displayName: 'Build Docker Images'
        dependsOn: RunUnitTests
        condition: succeeded()
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          - task: Docker@2
            displayName: 'Build Deployment Image'
            inputs:
              command: build
              repository: ${{ parameters.imageName }}
              dockerfile: '$(dockerfilePath)'
              buildContext: '$(rootPath)'
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Build Migration Image'
            inputs:
              command: build
              repository: ${{ parameters.imageName }}-migration
              dockerfile: '$(dockerfilePath)'
              buildContext: '$(rootPath)'
              arguments: '--target migrate'
              tags: |
                $(imageTag)
                latest

      # 🔒 Security Scan Job
      - job: SecurityScan
        displayName: 'Security Scan (Snyk)'
        dependsOn:
          - RunIntegrationTests
          - BuildImage
        condition: succeeded()
        pool:
          name: ${{ parameters.poolName }}
          demands:
            - Agent.Name -equals ${{ parameters.agentName }}
        steps:

          # Create output directory
          - script: |
              mkdir -p "$(Agent.TempDirectory)/sarif"
            displayName: 'Create Output Directory'

          # Scan NuGet dependencies for known CVEs
          - script: |
              snyk test \
                --file="$(Build.SourcesDirectory)" \
                --sarif-file-output="$(Agent.TempDirectory)/sarif/snyk-deps.sarif" \
                || true
            displayName: 'Snyk - NuGet Dependency Scan'
            env:
              SnykToken: $(SnykToken)

          # Scan C# code for vulnerabilities (SAST)
          - script: |
              snyk code test \
                "$(Build.SourcesDirectory)" \
                --sarif-file-output="$(Agent.TempDirectory)/sarif/snyk-code.sarif" \
                || true
            displayName: 'Snyk - C# Code Scan (SAST)'
            env:
              SnykToken: $(SnykToken)

          # Scan Docker image for vulnerabilities
          - script: |
              snyk container test ${{ parameters.imageName }}:latest \
                --file="$(dockerfilePath)" \
                --sarif-file-output="$(Agent.TempDirectory)/sarif/snyk-container.sarif" \
                || true
            displayName: 'Snyk - Docker Image Scan'
            env:
              SnykToken: $(SnykToken)

          # Publish all SARIF results as artifact
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Security Scan Results'
            condition: always()
            inputs:
              pathToPublish: '$(Agent.TempDirectory)/sarif'
              artifactName: 'CodeAnalysisLogs'