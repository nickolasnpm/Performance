trigger:
  branches:
    include:
      - develop

pr:
  branches:
    include:
      - develop

parameters:
  - name: poolName
    type: string
    default: 'Default'

  - name: agentName
    type: string
    default: 'raspi4'
  
  - name: serverName
    type: string
    default: 'raspberry-pi'

stages:
  # CI Stage
  - template: ../templates/build.yml
    parameters:
      poolName: ${{ parameters.poolName }}
      agentName: ${{ parameters.agentName }}
      imageName: 'performance'

  # CD Stage
  - template: ../templates/deploy.yml
    parameters:
      poolName: ${{ parameters.poolName }}
      agentName: ${{ parameters.agentName }}
      serverName: ${{ parameters.serverName }}
      appEnv: 'Development'
      targetBranch: 'refs/heads/develop'
      apiContainerName: 'performance-webapi-dev'
      dockerNetwork: 'performance-network-dev'
      apiPort: '8080'
      imageName: 'performance'
      keepImages: '10'